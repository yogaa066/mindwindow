<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindWindow | Neural Privacy Filter | Year 2112</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #00e5ff;
      --secondary: #8a2be2;
      --accent: #00ff88;
      --danger: #ff3366;
      --warning: #ffaa00;
      --dark: #0a0a0f;
      --glass: rgba(10, 25, 47, 0.4);
      --glass-border: rgba(0, 229, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      background: var(--dark);
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 229, 255, 0.1) 0%, transparent 50%),
        linear-gradient(180deg, #0a0a0f 0%, #000000 100%);
      color: var(--primary);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      transition: all 0.3s;
    }

    /* UNSHIELDED STATE: Red blinking emergency */
    body.unshielded {
      animation: dangerBlink 0.5s infinite alternate;
    }

    @keyframes dangerBlink {
      from { box-shadow: inset 0 0 0 0 rgba(255, 51, 102, 0); }
      to { box-shadow: inset 0 0 100px 50px rgba(255, 51, 102, 0.4); }
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* BOOT SCREEN */
    #bootScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      animation: bootFade 2.5s forwards;
    }

    @keyframes bootFade {
      0% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    .boot-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      color: var(--primary);
      text-shadow: 0 0 30px var(--primary);
      margin-bottom: 20px;
      animation: bootGlow 1.5s ease-in-out infinite alternate;
    }

    @keyframes bootGlow {
      from { text-shadow: 0 0 20px var(--primary); }
      to { text-shadow: 0 0 40px var(--primary), 0 0 60px var(--secondary); }
    }

    .boot-text {
      color: #66fcf1;
      font-size: 1rem;
      letter-spacing: 2px;
      text-align: center;
      padding: 0 20px;
    }

    .boot-bar {
      width: 300px;
      height: 4px;
      background: rgba(0, 229, 255, 0.2);
      margin-top: 30px;
      border-radius: 2px;
      overflow: hidden;
    }

    .boot-progress {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      width: 0%;
      animation: loadBar 2s forwards;
    }

    @keyframes loadBar {
      to { width: 100%; }
    }

    /* NAVIGATION */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 1001;
      padding: 15px 0;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary);
      text-shadow: 0 0 15px var(--primary);
    }

    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
    }

    .nav-links a {
      color: #66fcf1;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 1px;
      transition: all 0.3s;
      position: relative;
      cursor: pointer;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s;
    }

    .nav-links a:hover::after, .nav-links a.active::after {
      width: 100%;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      background: var(--primary);
      transition: 0.3s;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 20px 20px;
      position: relative;
      z-index: 1;
    }

    section {
      min-height: 100vh;
      padding: 40px 0;
      scroll-margin-top: 80px;
    }

    .window-panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 25px;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(0, 229, 255, 0.05);
      position: relative;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .window-panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.1), transparent);
      animation: scan 3s infinite;
    }

    @keyframes scan {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #66fcf1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title::before {
      content: "▸";
      color: var(--primary);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 40px;
      color: var(--primary);
      text-shadow: 0 0 20px var(--primary);
    }

    /* HOME PAGE */
    .hero {
      text-align: center;
      padding: 60px 30px;
      background: rgba(138, 43, 226, 0.1);
      border: 1px solid rgba(138, 43, 226, 0.4);
      border-radius: 15px;
      margin-bottom: 50px;
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 20px;
      text-shadow: 0 0 30px var(--secondary);
    }

    .hero p {
      font-size: 1.3rem;
      color: #66fcf1;
      margin-bottom: 30px;
    }

    .emergency-alert {
      background: rgba(255, 51, 102, 0.2);
      border: 2px solid var(--danger);
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      animation: alertPulse 2s infinite;
    }

    @keyframes alertPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255, 51, 102, 0.3); }
      50% { box-shadow: 0 0 25px rgba(255, 51, 102, 0.6); }
    }

    .hide-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .hide-card {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 10px;
      padding: 20px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .hide-card:hover {
      background: rgba(0, 255, 136, 0.1);
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
      transform: translateY(-5px);
    }

    .hide-card i {
      font-size: 2.5rem;
      color: var(--accent);
      margin-bottom: 15px;
      display: block;
    }

    .hide-card h3 {
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .hide-card .status {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .hide-card .status.unshielded {
      color: var(--danger);
    }

    .threat-feed {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 0, 100, 0.3);
      border-radius: 8px;
      padding: 15px;
      min-height: 140px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
    }

    .threat-line {
      margin: 8px 0;
      opacity: 0;
      animation: typeIn 0.5s forwards;
    }

    @keyframes typeIn {
      to { opacity: 1; }
    }

    .threat-device {
      color: var(--danger);
      font-weight: 700;
    }

    .threat-data {
      color: var(--warning);
    }

    .timer {
      margin-top: 15px;
      font-size: 1.5rem;
      font-family: 'Orbitron', sans-serif;
      color: var(--danger);
      text-align: center;
      text-shadow: 0 0 15px var(--danger);
    }

    /* ABOUT PAGE */
    .story-content {
      font-size: 1.1rem;
      line-height: 1.8;
    }

    .story-content p {
      margin-bottom: 20px;
      color: #b0e0e6;
    }

    .story-highlight {
      color: var(--danger);
      font-weight: 700;
      text-shadow: 0 0 10px var(--danger);
    }

    .timeline {
      margin: 40px 0;
      position: relative;
      padding-left: 30px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 2px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
    }

    .timeline-item {
      margin-bottom: 30px;
      position: relative;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -36px;
      top: 5px;
      width: 12px;
      height: 12px;
      background: var(--danger);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--danger);
    }

    .timeline-year {
      font-family: 'Orbitron', sans-serif;
      color: var(--warning);
      font-size: 1.2rem;
      margin-bottom: 5px;
    }

    /* HELP PAGE */
    .chat-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 25px;
    }

    .chat-box {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--primary);
      border-radius: 10px;
      height: 500px;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      animation: messageIn 0.3s;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      background: rgba(0, 229, 255, 0.1);
      border-left: 3px solid var(--primary);
    }

    .message.user {
      background: rgba(138, 43, 226, 0.1);
      border-left: 3px solid var(--secondary);
      text-align: right;
    }

    .chat-input {
      display: flex;
      padding: 15px;
      border-top: 1px solid var(--glass-border);
    }

    .chat-input input {
      flex: 1;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 10px;
      border-radius: 5px;
      font-family: 'Rajdhani', sans-serif;
    }

    .chat-input button {
      background: var(--primary);
      color: var(--dark);
      border: none;
      padding: 10px 20px;
      margin-left: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 700;
    }

    .emergency-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .frost-button {
      background: linear-gradient(135deg, var(--danger) 0%, #ff5588 100%);
      border: 3px solid var(--danger);
      color: white;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      padding: 20px;
      border-radius: 15px;
      cursor: pointer;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
      transition: all 0.3s ease;
    }

    .frost-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px rgba(255, 51, 102, 0.8);
    }

    .frost-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .breathe-circle {
      width: 150px;
      height: 150px;
      border: 3px solid var(--accent);
      border-radius: 50%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      animation: breathe 4s infinite ease-in-out;
      cursor: pointer;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--accent); }
      50% { transform: scale(1.2); box-shadow: 0 0 40px var(--accent); }
    }

    /* FULL SCREEN FROST OVERLAY */
    .frost-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 229, 255, 0.95);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
        repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.1) 10px, rgba(255, 255, 255, 0.1) 20px),
        repeating-linear-gradient(-45deg, transparent, transparent 15px, rgba(200, 230, 255, 0.15) 15px, rgba(200, 230, 255, 0.15) 30px);
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      backdrop-filter: blur(20px);
    }

    .frost-overlay.active {
      display: flex;
      animation: frostIn 0.5s ease-out;
    }

    @keyframes frostIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .frost-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 4rem;
      font-weight: 900;
      color: var(--dark);
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
      margin-bottom: 20px;
      animation: iceCrack 0.6s ease-out;
    }

    @keyframes iceCrack {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .gibberish {
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      color: var(--dark);
      background: rgba(255, 255, 255, 0.4);
      padding: 20px;
      border-radius: 8px;
      max-width: 80%;
      word-break: break-all;
      border: 2px solid rgba(255, 255, 255, 0.6);
    }

    .unfrost-button {
      margin-top: 30
